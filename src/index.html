<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-white text-black dark:bg-gray-800 dark:text-white">
    <div class="w-full">
      <header
        class="w-[95%] mx-auto bg-[rgba(0,0,0,0.2)] py-1 flex justify-between items-center h-10"
      >
        <div
          class="logo flex items-center gap-0.5 text-blue-600 capitalize font-bold ml-2.5"
        >
          <i class="fa-solid fa-hand-spock"></i>
          <h1>Hi ahmed</h1>
        </div>
        <nav class="flex justify-between items-center w-2/3">
          <ul
            class="gap-5 capitalize justify-between items-start absolute top-0 left-0 sm:h-fit h-[50vh] sm:static flex-col sm:flex-row bg-[rgba(0,0,0,0.2)] sm:bg-transparent backdrop-blur-sm w-full sm:w-fit  hidden sm:flex px-3.5"
          >
            <li class="close ml-auto sm:hidden pt-1 pr-3.5 mt-5">
              <i class="fa-solid fa-xmark"></i>
            </li>
            <li>Home</li>
            <li>about us</li>
            <li>services</li>
            <li>contact us</li>
          </ul>
          <div class="icons flex ml-auto gap-3.5 pr-1">
            <div class="bar duration-300 sm:hidden">
              <i class="fa-solid fa-bars"></i>
            </div>
            <div class="moon">
              <i class="fa-solid fa-moon"></i>
            </div>
          </div>
        </nav>
      </header>
    </div>
    <script src="script.js"></script>
  </body>
</html>
